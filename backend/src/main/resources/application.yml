server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/alspd_ai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 654321
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ai-share-secret-key-2024-very-long-and-secure-string
  expire: 604800000  # 7 days in ms

logging:
  level:
    com.aishare: debug
    com.aishare.mapper: debug   # 打印 SQL 语句
    org.apache.ibatis: debug    # 打印参数绑定
